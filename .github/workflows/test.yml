name: Phase 0-2 tests

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install worker dev tools
        run: python -m pip install -e "worker[dev]"
      - name: Run Python tests and lint
        shell: pwsh
        run: ./tools/run_python_tests.ps1

  godot:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.1
          channel: stable
          use-dotnet: false
      - name: Generate fixtures
        run: python tools/generate_fixtures.py
      - name: Run Godot headless tests
        shell: pwsh
        run: ./tools/run_godot_tests.ps1 -GodotPath godot

